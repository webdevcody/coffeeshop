<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#06121f" />
    <title>Light Cycles · The Daily Grind</title>
    <meta
      name="description"
      content="Two-player online Tron Light Cycles — sit at a café table and race a friend."
    />
    <style>
      :root {
        --bg: #06121f;
        --arena: #081c2e;
        --grid: #0f2a40;
        --ink: #dff3ff;
        --muted: #8fb3cc;
        --p0: #22d3ee;
        --p1: #fb923c;
        --accent: #7fffd4;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: radial-gradient(circle at 50% 0%, #0a2138, #03080f 72%);
        color: var(--ink);
        font-family: ui-rounded, "Segoe UI", system-ui, -apple-system, sans-serif;
        -webkit-user-select: none;
        user-select: none;
        overflow: hidden;
      }
      #app {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 10px;
      }
      header { text-align: center; line-height: 1.2; }
      header h1 { margin: 0; font-size: clamp(17px, 3.6vw, 24px); }
      #status { margin-top: 2px; font-size: clamp(12px, 2.6vw, 15px); color: var(--muted); min-height: 1.2em; }
      #scores {
        display: flex; gap: 18px; justify-content: center; align-items: center;
        font-size: clamp(13px, 2.8vw, 16px); font-weight: 700;
      }
      .score { display: inline-flex; align-items: center; gap: 7px; }
      .score .dot { width: 13px; height: 13px; border-radius: 3px; display: inline-block; }
      .score.p0 { color: var(--p0); } .score.p0 .dot { background: var(--p0); }
      .score.p1 { color: var(--p1); } .score.p1 .dot { background: var(--p1); }
      .score.dead { opacity: 0.4; text-decoration: line-through; }

      .stage { position: relative; line-height: 0; }
      canvas {
        background: var(--arena);
        border: 3px solid #12354f;
        border-radius: 8px;
        width: min(94vw, 70vh);
        height: auto;
        image-rendering: pixelated;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.5), inset 0 0 60px rgba(0, 0, 0, 0.4);
        touch-action: none;
      }
      #overlay {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; gap: 6px; pointer-events: none;
      }
      #overlay .big { font-size: clamp(34px, 9vw, 72px); font-weight: 800; text-shadow: 0 2px 18px rgba(0,0,0,0.7); }
      #overlay .sub { font-size: clamp(15px, 3.6vw, 22px); font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.7); }
      #overlay .win { color: var(--accent); }
      #overlay .lose { color: #ff9aa2; }
      #overlay .draw { color: #ffe08a; }
      .hidden { display: none !important; }

      footer { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center; }
      .pad { display: flex; gap: 10px; }
      .pad button {
        font-size: 26px; width: 64px; height: 50px; line-height: 1;
        color: var(--ink); background: #0f2a40; border: 1px solid #1d4a6b; border-radius: 10px; cursor: pointer;
      }
      .pad button:active { background: #17415f; }
      button.cta {
        font: inherit; color: var(--ink); background: #12354f; border: 1px solid #1d4a6b;
        border-radius: 8px; padding: 8px 16px; cursor: pointer;
      }
      button.cta:hover { background: #184057; }
      .hint { font-size: 12px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>🏍️ Light Cycles</h1>
        <div id="status">Loading…</div>
      </header>
      <div id="scores">
        <span class="score p0" id="score0"><span class="dot"></span><span id="score0v">0</span></span>
        <span class="score p1" id="score1"><span class="dot"></span><span id="score1v">0</span></span>
      </div>
      <div class="stage">
        <canvas id="canvas" width="400" height="260"></canvas>
        <div id="overlay" class="hidden">
          <div class="big" id="ovBig"></div>
          <div class="sub" id="ovSub"></div>
        </div>
      </div>
      <footer>
        <div class="pad">
          <button id="leftBtn" type="button" aria-label="Turn left">◀</button>
          <button id="rightBtn" type="button" aria-label="Turn right">▶</button>
        </div>
        <button id="newGameBtn" class="cta hidden" type="button">Play again</button>
      </footer>
      <div class="hint">Steer with ← → or A / D (or the on-screen buttons). You can't stop.</div>
    </div>

    <script src="./peerjs.min.js"></script>
    <script>
      "use strict";
      // Same room contract as the other café games: #host=<CODE> registers the
      // room's PeerJS peer, #join=<CODE> connects to it, #spectate=<CODE> watches
      // read-only. Real-time + host-authoritative: the host runs the whole
      // simulation and streams the full arena state every tick; the guest sends
      // only its steering input; spectators just subscribe to the broadcast.
      const PEER_PREFIX = "coffeeshop-tron-";

      const statusEl = document.getElementById("status");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const overlayEl = document.getElementById("overlay");
      const ovBigEl = document.getElementById("ovBig");
      const ovSubEl = document.getElementById("ovSub");
      const newGameBtn = document.getElementById("newGameBtn");
      const score0v = document.getElementById("score0v");
      const score1v = document.getElementById("score1v");
      const score0El = document.getElementById("score0");
      const score1El = document.getElementById("score1");

      // ===== PURE LOGIC START (no DOM/network — deterministic arena sim) =====
      // Directions: 0=up, 1=right, 2=down, 3=left.
      const DX = [0, 1, 0, -1];
      const DY = [-1, 0, 1, 0];
      const turnLeft = (d) => (d + 3) % 4;
      const turnRight = (d) => (d + 1) % 4;

      function makeArena(cols, rows) {
        return { cols, rows, occ: new Int8Array(cols * rows).fill(-1) };
      }
      const cellIndex = (a, x, y) => y * a.cols + x;
      const inBounds = (a, x, y) => x >= 0 && x < a.cols && y >= 0 && y < a.rows;
      const isOccupied = (a, x, y) => a.occ[cellIndex(a, x, y)] >= 0;
      function occupy(a, x, y, colorIdx) {
        a.occ[cellIndex(a, x, y)] = colorIdx;
      }

      // Advance every alive cycle one cell. A cycle dies if its next cell is a
      // wall, an existing trail/head, or a cell another cycle moves into the same
      // tick (head-on / shared target). Survivors leave a trail and advance.
      // Returns the indices that died this tick. Mutates arena.occ + cycles.
      function stepCycles(arena, cycles) {
        const proposals = [];
        for (const c of cycles) {
          if (!c.alive) continue;
          c.dir = c.nextDir;
          proposals.push({ c, nx: c.x + DX[c.dir], ny: c.y + DY[c.dir] });
        }
        const targetCount = new Map();
        for (const p of proposals) {
          const k = p.nx + "," + p.ny;
          targetCount.set(k, (targetCount.get(k) || 0) + 1);
        }
        const died = [];
        const survivors = [];
        for (const p of proposals) {
          const { c, nx, ny } = p;
          const blocked =
            !inBounds(arena, nx, ny) ||
            isOccupied(arena, nx, ny) ||
            targetCount.get(nx + "," + ny) > 1;
          if (blocked) {
            c.alive = false;
            died.push(c.idx);
          } else {
            survivors.push(p);
          }
        }
        // Commit after all checks so evaluation order can't matter.
        for (const p of survivors) {
          p.c.x = p.nx;
          p.c.y = p.ny;
          occupy(arena, p.nx, p.ny, p.c.colorIdx);
        }
        return died;
      }

      // Two cycles facing each other across the arena, a few cells from the walls.
      function spawnCycles(arena) {
        const midY = Math.floor(arena.rows / 2);
        const cycles = [
          { idx: 0, colorIdx: 0, x: 3, y: midY, dir: 1, nextDir: 1, alive: true },
          { idx: 1, colorIdx: 1, x: arena.cols - 4, y: midY, dir: 3, nextDir: 3, alive: true },
        ];
        for (const c of cycles) occupy(arena, c.x, c.y, c.colorIdx);
        return cycles;
      }
      // ===== PURE LOGIC END =====

      // ---- Config ----------------------------------------------------------
      const COLS = 40;
      const ROWS = 26;
      const CELL = 10; // canvas backing-store cells; CSS scales the canvas up
      const TICK_MS = 85;
      const COUNTDOWN = 3;
      const ROUND_GAP_MS = 1700;
      const WIN_SCORE = 3; // best-of-5
      const COLORS = ["#22d3ee", "#fb923c"];
      const HEADS = ["#a8f3ff", "#ffd0a8"];
      const NAMES = ["Cyan", "Orange"];

      canvas.width = COLS * CELL;
      canvas.height = ROWS * CELL;

      // ---- Shared render state (everyone) ----------------------------------
      let view = null; // last applied state snapshot
      let mySeat = null; // 0 host, 1 guest, null spectator
      let isSpectator = false;
      let conn = null;
      const spectators = [];

      // ---- Host-authoritative simulation (host only) -----------------------
      let sim = null; // { arena, cycles, scores, round, phase, countdown, roundWinner, matchWinner }
      let tickTimer = null;
      let countdownTimer = null;
      let gapTimer = null;
      function clearTimers() {
        clearInterval(tickTimer); tickTimer = null;
        clearInterval(countdownTimer); countdownTimer = null;
        clearTimeout(gapTimer); gapTimer = null;
      }

      // ---- Networking ------------------------------------------------------
      function send(msg) {
        if (conn && conn.open) conn.send(msg);
      }
      function broadcast(s) {
        send(s);
        for (const c of spectators) if (c.open) c.send(s);
      }

      // Build the full state snapshot from the host's simulation.
      function buildState() {
        let grid = "";
        const occ = sim.arena.occ;
        for (let i = 0; i < occ.length; i++) grid += occ[i] < 0 ? "." : String(occ[i]);
        return {
          type: "state",
          phase: sim.phase,
          cols: sim.arena.cols,
          rows: sim.arena.rows,
          grid,
          cycles: sim.cycles.map((c) => ({ x: c.x, y: c.y, dir: c.dir, alive: c.alive, colorIdx: c.colorIdx })),
          scores: sim.scores.slice(),
          round: sim.round,
          countdown: sim.countdown,
          roundWinner: sim.roundWinner,
          matchWinner: sim.matchWinner,
        };
      }
      function pushState() {
        const s = buildState();
        applyState(s); // host renders from the same snapshot everyone else gets
        broadcast(s);
      }

      // ---- Host game flow --------------------------------------------------
      function startMatch() {
        sim = {
          arena: makeArena(COLS, ROWS),
          cycles: [],
          scores: [0, 0],
          round: 0,
          phase: "lobby",
          countdown: 0,
          roundWinner: null,
          matchWinner: null,
        };
        newGameBtn.classList.add("hidden");
        beginRound(1);
      }

      function beginRound(round) {
        clearTimers();
        sim.arena = makeArena(COLS, ROWS);
        sim.cycles = spawnCycles(sim.arena);
        sim.round = round;
        sim.phase = "countdown";
        sim.countdown = COUNTDOWN;
        sim.roundWinner = null;
        sim.matchWinner = null;
        pushState();
        countdownTimer = setInterval(() => {
          sim.countdown -= 1;
          if (sim.countdown <= 0) {
            clearInterval(countdownTimer);
            countdownTimer = null;
            sim.phase = "playing";
            pushState();
            tickTimer = setInterval(hostTick, TICK_MS);
          } else {
            pushState();
          }
        }, 800);
      }

      function hostTick() {
        stepCycles(sim.arena, sim.cycles);
        const alive = sim.cycles.filter((c) => c.alive);
        if (alive.length <= 1) {
          clearInterval(tickTimer);
          tickTimer = null;
          endRound(alive.length === 1 ? alive[0].idx : null);
        } else {
          pushState();
        }
      }

      function endRound(winner) {
        sim.roundWinner = winner;
        if (winner !== null) sim.scores[winner] += 1;
        sim.phase = "roundover";
        pushState();
        gapTimer = setTimeout(() => {
          if (sim.scores[0] >= WIN_SCORE || sim.scores[1] >= WIN_SCORE) {
            sim.phase = "matchover";
            sim.matchWinner = sim.scores[0] > sim.scores[1] ? 0 : 1;
            newGameBtn.classList.remove("hidden");
            pushState();
          } else {
            beginRound(sim.round + 1);
          }
        }, ROUND_GAP_MS);
      }

      // Apply a steering turn to a cycle. Turns are computed from the committed
      // direction (not the pending one) so two quick taps can't fold into a
      // 180° reversal into your own trail.
      function hostTurn(idx, dir) {
        if (!sim || (sim.phase !== "playing" && sim.phase !== "countdown")) return;
        const c = sim.cycles[idx];
        if (!c || !c.alive) return;
        c.nextDir = dir === "left" ? turnLeft(c.dir) : turnRight(c.dir);
      }

      newGameBtn.addEventListener("click", () => {
        if (mySeat === 0) startMatch();
      });

      // ---- Input -----------------------------------------------------------
      function steer(dir) {
        if (isSpectator || mySeat === null) return;
        if (mySeat === 0) hostTurn(0, dir);
        else send({ type: "input", turn: dir });
      }
      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") { steer("left"); e.preventDefault(); }
        else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") { steer("right"); e.preventDefault(); }
      });
      const bindPad = (id, dir) => {
        const b = document.getElementById(id);
        b.addEventListener("pointerdown", (e) => { e.preventDefault(); steer(dir); });
      };
      bindPad("leftBtn", "left");
      bindPad("rightBtn", "right");

      // ---- Rendering (everyone renders from a state snapshot) ---------------
      function applyState(s) {
        view = s;
        draw();
        updateHud();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!view) return;
        // subtle grid
        ctx.strokeStyle = "rgba(120,180,220,0.06)";
        ctx.lineWidth = 1;
        for (let x = 0; x <= COLS; x++) {
          ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, ROWS * CELL); ctx.stroke();
        }
        for (let y = 0; y <= ROWS; y++) {
          ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(COLS * CELL, y * CELL); ctx.stroke();
        }
        // trails
        const g = view.grid || "";
        for (let i = 0; i < g.length; i++) {
          const ch = g[i];
          if (ch === ".") continue;
          const idx = ch.charCodeAt(0) - 48;
          const x = i % view.cols;
          const y = (i / view.cols) | 0;
          ctx.fillStyle = COLORS[idx] || "#fff";
          ctx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
        }
        // heads (brighter, glowing)
        for (const c of view.cycles || []) {
          if (!c.alive) continue;
          ctx.save();
          ctx.shadowColor = COLORS[c.colorIdx];
          ctx.shadowBlur = 12;
          ctx.fillStyle = HEADS[c.colorIdx] || "#fff";
          ctx.fillRect(c.x * CELL, c.y * CELL, CELL, CELL);
          ctx.restore();
        }
        drawOverlay();
      }

      function drawOverlay() {
        const s = view;
        let big = "", sub = "", cls = "";
        if (s.phase === "countdown") {
          big = s.countdown > 0 ? String(s.countdown) : "Go!";
          sub = "Round " + s.round;
        } else if (s.phase === "roundover") {
          if (s.roundWinner === null) { big = "Draw"; cls = "draw"; }
          else if (mySeat === null) { big = NAMES[s.roundWinner] + " wins"; cls = ""; }
          else if (s.roundWinner === mySeat) { big = "Round won!"; cls = "win"; }
          else { big = "Eliminated"; cls = "lose"; }
          sub = s.scores[0] + " – " + s.scores[1];
        } else if (s.phase === "matchover") {
          if (mySeat === null) { big = NAMES[s.matchWinner] + " wins!"; cls = ""; }
          else if (s.matchWinner === mySeat) { big = "You win the match! 🎉"; cls = "win"; }
          else { big = "You lost the match."; cls = "lose"; }
          sub = "Final " + s.scores[0] + " – " + s.scores[1] +
            (mySeat === 0 ? " · press Play again" : mySeat === null ? "" : " · waiting for host");
        }
        if (big) {
          ovBigEl.textContent = big;
          ovBigEl.className = "big " + cls;
          ovSubEl.textContent = sub;
          overlayEl.classList.remove("hidden");
        } else {
          overlayEl.classList.add("hidden");
        }
      }

      function updateHud() {
        const s = view;
        score0v.textContent = s.scores ? s.scores[0] : 0;
        score1v.textContent = s.scores ? s.scores[1] : 0;
        const a0 = s.cycles && s.cycles[0] ? s.cycles[0].alive : true;
        const a1 = s.cycles && s.cycles[1] ? s.cycles[1].alive : true;
        const playing = s.phase === "playing";
        score0El.classList.toggle("dead", playing && !a0);
        score1El.classList.toggle("dead", playing && !a1);
        const me = mySeat === null ? "" : " · you are " + NAMES[mySeat];
        if (s.phase === "countdown") setStatus("Get ready…" + me, "");
        else if (s.phase === "playing") setStatus("Race!" + me, "");
        else if (s.phase === "roundover") setStatus("Round over." + me, "");
        else if (s.phase === "matchover") setStatus("Match over." + me, "");
      }

      function setStatus(text, cls) {
        statusEl.textContent = text;
        statusEl.className = cls || "";
      }

      // ---- Connection handling ---------------------------------------------
      function handleData(msg) {
        if (!msg || typeof msg !== "object") return;
        if (mySeat === 0) {
          // Host: the only thing a guest sends is steering input.
          if (msg.type === "hello") {
            if (!sim || sim.phase === "lobby") startMatch();
          } else if (msg.type === "input") {
            hostTurn(1, msg.turn === "left" ? "left" : "right");
          }
          return;
        }
        // Guest / spectator: render whatever the host broadcasts.
        if (msg.type === "state") applyState(msg);
      }

      function wireConnection(c) {
        conn = c;
        c.on("open", () => {
          if (mySeat === 1) send({ type: "hello" });
        });
        c.on("data", handleData);
        c.on("close", onPeerGone);
        c.on("error", onPeerGone);
      }

      function onPeerGone() {
        clearTimers();
        if (mySeat === 0) {
          sim = null;
          newGameBtn.classList.add("hidden");
          overlayEl.classList.add("hidden");
          setStatus("Opponent left — waiting for a new challenger…", "");
        } else {
          setStatus("Disconnected from the table.", "");
        }
      }

      function addSpectator(c) {
        c.on("open", () => {
          spectators.push(c);
          if (sim) c.send(buildState()); // catch a mid-round spectator up immediately
        });
        c.on("data", () => {});
        c.on("close", () => removeSpectator(c));
        c.on("error", () => removeSpectator(c));
      }
      function removeSpectator(c) {
        const i = spectators.indexOf(c);
        if (i >= 0) spectators.splice(i, 1);
      }

      function parseHash() {
        const h = (location.hash || "").replace(/^#/, "");
        if (h.startsWith("host=")) return { role: "host", code: h.slice(5).toUpperCase() };
        if (h.startsWith("join=")) return { role: "guest", code: h.slice(5).toUpperCase() };
        if (h.startsWith("spectate=")) return { role: "spectator", code: h.slice(9).toUpperCase() };
        return null;
      }

      function boot() {
        draw();
        if (typeof Peer === "undefined") { setStatus("Failed to load networking library.", ""); return; }
        const info = parseHash();
        if (!info) { setStatus("Open this game from a café table to start a match.", ""); return; }

        if (info.role === "host") {
          mySeat = 0;
          setStatus("Waiting for an opponent…", "");
          const peer = new Peer(PEER_PREFIX + info.code);
          peer.on("connection", (c) => {
            if (c.metadata && c.metadata.spectator) { addSpectator(c); return; }
            if (conn && conn.open) { c.close(); return; } // already have a challenger
            wireConnection(c);
          });
          peer.on("error", (e) => setStatus("Connection error: " + (e && e.type ? e.type : "unknown"), ""));
        } else if (info.role === "spectator") {
          isSpectator = true;
          mySeat = null;
          setStatus("Connecting to spectate…", "");
          const peer = new Peer();
          peer.on("open", () => {
            const c = peer.connect(PEER_PREFIX + info.code, { reliable: true, metadata: { spectator: true } });
            conn = c;
            c.on("data", handleData);
            c.on("open", () => setStatus("👁 Spectating…", ""));
            c.on("close", () => setStatus("The match ended.", ""));
            c.on("error", () => setStatus("The match ended.", ""));
          });
          peer.on("error", (e) => setStatus("Connection error: " + (e && e.type ? e.type : "unknown"), ""));
        } else {
          mySeat = 1;
          setStatus("Connecting to the table…", "");
          const peer = new Peer();
          peer.on("open", () => wireConnection(peer.connect(PEER_PREFIX + info.code, { reliable: true })));
          peer.on("error", (e) => setStatus("Connection error: " + (e && e.type ? e.type : "unknown"), ""));
        }
      }

      window.addEventListener("DOMContentLoaded", boot);
    </script>
  </body>
</html>
